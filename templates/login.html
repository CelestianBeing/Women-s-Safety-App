{% extends "base.html" %}
{% block title %}Login — Safety Route Planner{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card">
    <h1 style="text-align:center; margin-bottom:24px;">🔑 Login</h1>
    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <div class="form-group" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="remember" name="remember" style="width:auto;" />
        <label for="remember" style="margin:0; font-weight:normal;">Remember me for 8 hours</label>
      </div>
      <button type="submit" class="btn btn-accent btn-full">Log In</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:.9rem; color:var(--clr-muted);">
      Don't have an account? <a href="/register">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
