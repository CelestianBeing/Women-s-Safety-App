{% extends "base.html" %}
{% block title %}Register — Safety Route Planner{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card">
    <h1 style="text-align:center; margin-bottom:24px;">✍️ Create Account</h1>
    <form method="POST" action="/register">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="80"
               autocomplete="username" placeholder="e.g. jane_doe" />
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label for="password">Password <span class="text-muted" style="font-weight:normal;">(min. 8 characters)</span></label>
        <input type="password" id="password" name="password" required minlength="8"
               autocomplete="new-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-accent btn-full">Create Account</button>
    </form>
    <p style="text-align:center; margin-top:16px; font-size:.9rem; color:var(--clr-muted);">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
