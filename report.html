{% extends "base.html" %}
{% block content %}
<h1>Report an Incident</h1>
<p>Your report helps keep the community safe.</p>
<div id="reportMap" style="height: 400px;"></div>
<form id="reportForm">
    <label>Type:
        <select id="reportType">
            <option value="harassment">Harassment</option>
            <option value="stalking">Stalking</option>
            <option value="poor_lighting">Poor Lighting</option>
            <option value="drunk_groups">Drunk Groups</option>
            <option value="suspicious">Suspicious Activity</option>
            <option value="other">Other</option>
        </select>
    </label>
    <label>Severity (1-5): <input type="number" id="severity" min="1" max="5" value="3"></label>
    <label>Description: <textarea id="desc"></textarea></label>
    <input type="hidden" id="lat">
    <input type="hidden" id="lng">
    <button type="submit">Submit Report</button>
</form>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/report.js') }}"></script>
{% endblock %}
